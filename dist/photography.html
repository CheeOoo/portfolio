<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="The Archive - Categories">
    <meta property="og:description" content="Photography, design, web, and music. All in one portfolio.">
    <meta property="og:image"
        content="https://res.cloudinary.com/dib9lpyjw/image/upload/c_auto,g_south,h_630,w_1200/l_sigwh_rhjv4w/c_scale,fl_relative,w_0.25/fl_layer_apply,fl_no_overflow,g_south_east,x_30,y_30/16_canvu7.jpg">
    <meta property="og:url" content="https://cheeooo.github.io/portfolio">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <title>The Archive — Select</title>
    <link rel="icon" type="image/x-icon" href="../src/maze.png">
    <link rel="icon" type="image/x-icon" href="../src/leaf-nature-forest-brand-plant_icon-icons.com_59259.png">
    <link rel="stylesheet" href="output.css">
    <link rel="stylesheet" href="./css/indexStyle.css">
    <style>
        .category-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-top: 2px solid rgb(41 41 41);
            border-bottom: 2px solid rgb(41 41 41);
        }


        .category-col {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 2px solid rgb(41 41 41);
            padding: 1.5rem 0;
            text-decoration: none;
            color: inherit;
            min-height: 70vh;
            transition: background-color 0.2s ease;

        }

        .category-col>* {
            z-index: 1;
        }

        .category-col {
            position: relative;
            overflow: hidden;
            /* prevents blur from bleeding outside */
        }

        .category-col::before {
            content: '';
            position: absolute;
            inset: -10px;
            /* compensates for blur edge softening */
            z-index: 0;
            filter: brightness(0.8);
            transition: filter 0.3s ease;
        }

        .category-col:nth-child(1)::before {
            background: url(https://res.cloudinary.com/dib9lpyjw/image/upload/q_auto:eco/f_auto,o_100/v1775160482/3_fxiyh4.jpg);
            background-size: auto 100%;
            background-position: center;
        }

        .category-col:nth-child(2)::before {
            background: url(https://res.cloudinary.com/dib9lpyjw/image/upload/q_auto:eco/f_auto,o_100/v1775160482/IMG_9705-1_v9xkr0.jpg);
            background-size: auto 100%;
            background-position: center;
        }

        .category-col:nth-child(3)::before {
            background: url(https://res.cloudinary.com/dib9lpyjw/image/upload/q_auto:eco/f_auto/v1775160851/20230311-IMG_4418_infzza.jpg);
            background-size: auto 100%;
            background-position: center;
        }

        .category-col:nth-child(4)::before {
            background: url(https://res.cloudinary.com/dib9lpyjw/image/upload/q_auto:eco/f_auto/v1778669619/teeth_mqlfcm.png);
            background-size: auto 100%;
            background-position: center;
        }

        .category-col:hover::before {
            filter: brightness(0.5);
        }

        .category-col:first-child {
            border-left: 2px solid rgb(41 41 41);
        }

        .category-col:hover {
            background-color: rgb(255 255 255 / 0.03);
        }


        .category-col:hover .category-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        .category-index {
            font-family: "InputMono", UI-Mono;
            font-size: 0.725rem;
            text-transform: uppercase;
            color: rgb(255 255 255 / 0.4);
            padding: 0 1rem;
        }

        .category-name {
            font-family: "NeueHaasUnica", sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: rgb(255 255 255);
            line-height: 130%;
            padding: 0 1rem;
        }

        .category-arrow {
            font-family: "InputMono", UI-Mono;
            font-size: 0.725rem;
            text-transform: uppercase;
            color: rgb(255 255 255 / 0.4);
            padding: 0 1rem;
            opacity: 0;
            transform: translateX(0);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        @media (max-width: 767px) {
            .category-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            #nav-name {
                grid-column-end: 6;
            }


            .category-col {
                min-height: 30vh;
            }

            #nav-tag {
                grid-column-start: 7;
            }
        }

        @media (max-width:1023px) {
            #navbar-location {
                display: none;
            }
        }

        @media (max-width: 1776px) {
            #page-container {
                max-width: 97vw;
            }
        }
    </style>
</head>

<body>
    <div class="w-full flex items-center flex-col">
        <div id="page-container" class="margin max-w-8xl w-full">
            <nav id="navbar" class="nav border-b-2 border-secondary-color grid-layout py-4">
                <h1 id="nav-name"
                    class="font-NeueHaas text-15 font-medium text-text-color col-span-4 col-start-1 hover:text-violet-300 txt">
                    <a href="index.html">Marcus Haugstrup</a>
                </h1>
                <h1 id="nav-tag"
                    class="font-NeueHaas text-15 font-medium text-text-color col-span-6 md:col-start-7 lg:col-start-7 md:col-span-4 lg:col-span-2 txt">
                    Photography
                </h1>
                <h1 id="navbar-location"
                    class="font-NeueHaas text-15 font-medium text-text-color col-span-3 lg:inline md:col-start-9 txt">
                    Billund, Denmark
                </h1>
            </nav>

            <main>
                <section class="w-full grid grid-cols-12 grid-gap relative max-w-8xl">
                    <section class="my-6 grid-layout">
                        <div
                            class="flex flex-col font-NeueHaas text-15 font-medium col-span-4 col-start-1 col-end-13 gap-3 md:col-end-6 txt">
                            <p class="text-white opacity-40 font-InputMono caption">browse</p>
                            <h1
                                class="font-NeueHaas text-15 font-medium text-text-color col-start-1 col-end-13 mb-4 md:col-start-1 md:mb-0 txt">
                                Select a category to browse the full collection.
                            </h1>
                        </div>
                    </section>

                    <div class="col-start-1 col-end-13">
                        <div class="category-grid">

                            <a href="gallery.html?tag=Car" class="category-col">
                                <span class="category-index">01</span>
                                <span class="category-name">Cars</span>
                                <span class="category-arrow">→ View</span>
                            </a>

                            <a href="gallery.html?tag=Travel" class="category-col">
                                <span class="category-index">02</span>
                                <span class="category-name">Travel</span>
                                <span class="category-arrow">→ View</span>
                            </a>

                            <a href="gallery.html?tag=Family" class="category-col">
                                <span class="category-index">03</span>
                                <span class="category-name">Family</span>
                                <span class="category-arrow">→ View</span>
                            </a>

                            <a href="gallery.html?tag=Graphics" class="category-col">
                                <span class="category-index">04</span>
                                <span class="category-name">Graphic Design</span>
                                <span class="category-arrow">→ View</span>
                            </a>

                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>
</body>

</html>
